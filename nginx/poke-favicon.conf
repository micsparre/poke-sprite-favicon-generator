# Poke Sprite Favicon Generator – nginx reverse proxy with HTTPS
#
# Deploy instructions:
# 1. Install nginx + certbot on the server
#      apt install nginx certbot python3-certbot-nginx
# 2. Copy this file to /etc/nginx/sites-available/
#      cp poke-favicon.conf /etc/nginx/sites-available/
# 3. Symlink to sites-enabled
#      ln -s /etc/nginx/sites-available/poke-favicon.conf /etc/nginx/sites-enabled/
# 4. Run: certbot --nginx -d yourdomain.com
# 5. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
